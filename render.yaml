services:
  - type: web
    name: glosetrenings-app
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:pwa
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false  # Du setter denne manuelt i Render dashboard
